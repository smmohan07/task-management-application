<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header>
        <h1>Task Manager</h1>
        <button id="logoutBtn" class="secondary hide">Logout</button>
      </header>

      <main>
        <section id="authSection" class="card">
          <div class="auth-tabs">
            <button id="showLogin" class="active">Login</button>
            <button id="showRegister">Register</button>
          </div>

          <form id="authForm">
            <h2 id="authTitle">Login</h2>
            <div class="form-group">
              <label for="nameInput">Name</label>
              <input id="nameInput" type="text" placeholder="Enter your name" />
            </div>
            <div class="form-group">
              <label for="emailInput">Email</label>
              <input id="emailInput" type="email" placeholder="Enter your email" required />
            </div>
            <div class="form-group">
              <label for="passwordInput">Password</label>
              <input id="passwordInput" type="password" placeholder="Enter a password" required />
            </div>
            <button class="primary" type="submit">Continue</button>
            <p class="message" id="authMessage"></p>
          </form>
        </section>

        <section id="taskSection" class="card hide">
          <div class="task-header">
            <div>
              <h2>My Tasks</h2>
              <p id="welcomeText"></p>
            </div>
            <button id="newTaskBtn" class="primary">New Task</button>
          </div>

          <div id="taskEditor" class="card task-editor hide">
            <h3 id="editorTitle">New Task</h3>
            <div class="form-group">
              <label for="taskTitleInput">Title</label>
              <input id="taskTitleInput" type="text" placeholder="Task title" />
            </div>
            <div class="form-group">
              <label for="taskDescInput">Description</label>
              <textarea id="taskDescInput" rows="4" placeholder="Describe the task"></textarea>
            </div>
            <div class="form-group form-row">
              <button id="saveTaskBtn" class="primary">Save Task</button>
              <button id="cancelTaskBtn" class="secondary">Cancel</button>
            </div>
            <p class="message" id="taskMessage"></p>
          </div>

          <div class="task-filters">
            <button data-filter="all" class="active">All</button>
            <button data-filter="pending">Pending</button>
            <button data-filter="completed">Completed</button>
          </div>

          <div id="taskList" class="task-list"></div>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
